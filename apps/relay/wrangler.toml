# apps/relay/wrangler.toml
# Cloudflare Worker (Durable Object) for WebRTC signaling relay
#
# Deploy: wrangler deploy
# Local dev: wrangler dev

name = "fortress-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDO"

