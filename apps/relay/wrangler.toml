# apps/relay/wrangler.toml
name = "fortress-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDO"

[[durable_objects.bindings]]
name = "RELAY_REGISTRY"
class_name = "RelayRegistryDO"

# ── TURN ─────────────────────────────────────────────────────────────────────
# TURN_KEY_ID and TURN_KEY_API_TOKEN are Wrangler secrets — never add them here.
# Run:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_KEY_API_TOKEN

[vars]
# Lock /turn-credentials CORS to the SPA origin.
WEB_ORIGIN = "https://fatedfortress.com"
